# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str_gnss_rov
      output_tags: [fmt_gnss_rov]
      type: file
      path: /mnt/nvme1/datasets/gici_open_dataset/5.2/gnss_rover.bin
  - streamer:
      tag: str_gnss_ref
      output_tags: [fmt_gnss_ref]
      type: file
      path: /mnt/nvme1/datasets/gici_open_dataset/5.2/gnss_reference.bin
  - streamer:
      tag: str_gnss_eph
      output_tags: [fmt_gnss_eph]
      type: file
      path: /mnt/nvme1/datasets/gici_open_dataset/5.2/gnss_ephemeris.bin
  - streamer:
      tag: str_gnss_ssr
      output_tags: [fmt_gnss_ssr]
      type: file
      path: /mnt/nvme1/datasets/gici_open_dataset/5.2/gnss_ssr.bin
  - streamer:
      tag: str_imu
      output_tags: [fmt_imu]
      type: file
      path: /mnt/nvme1/datasets/gici_open_dataset/5.2/imu.bin
  - streamer:
      tag: str_camera
      output_tags: [fmt_camera]
      type: file
      path: /mnt/nvme1/datasets/gici_open_dataset/5.2/camera.bin
      buffer_length: 361472  # 752 * 480 + 512 

  formators:
  - formator:
      io: input
      tag: fmt_gnss_rov
      type: gnss-raw
      sub_type: tersus
  - formator:
      io: input
      tag: fmt_gnss_ref
      type: gnss-rtcm-3
      start_time: 2023.05.21
  - formator:
      io: input
      tag: fmt_gnss_eph
      type: gnss-rtcm-3
      start_time: 2023.05.21
  - formator:
      io: input
      tag: fmt_gnss_ssr
      type: gnss-rtcm-3
      start_time: 2023.05.21
  - formator:
      io: input
      tag: fmt_imu
      type: imu-pack
  - formator:
      io: input
      tag: fmt_camera
      width: 752
      height: 480
      type: image-pack

rosbags:
- rosbag: 
    tag: rosbag_gnss_rov
    type: rosbag
    input_tags: [fmt_gnss_rov]
    path: /mnt/nvme1/datasets/gici_open_dataset/5.2/gici_all.bag
    topic_name: /gici/gnss_rover
    format: gnss_raw
    enable_observation: true
- rosbag: 
    tag: rosbag_gnss_ref
    type: rosbag
    input_tags: [fmt_gnss_ref]
    path: /mnt/nvme1/datasets/gici_open_dataset/5.2/gici_all.bag
    topic_name: /gici/gnss_reference
    format: gnss_raw
    enable_observation: true
    enable_antenna_position: true
- rosbag: 
    tag: rosbag_gnss_eph
    type: rosbag
    input_tags: [fmt_gnss_eph]
    path: /mnt/nvme1/datasets/gici_open_dataset/5.2/gici_all.bag
    topic_name: /gici/gnss_ephemeris
    format: gnss_raw
    enable_ephemeris: true
    enable_ionosphere_parameter: true
- rosbag:
    tag: rosbag_gnss_ssr
    type: rosbag
    input_tags: [fmt_gnss_ssr]
    path: /mnt/nvme1/datasets/gici_open_dataset/5.2/gici_all.bag
    topic_name: /gici/gnss_ssr
    format: gnss_raw
    enable_ssr_code_bias: true
    enable_ssr_phase_bias: true
    enable_ssr_ephemeris: true
- rosbag: 
    tag: rosbag_imu
    type: rosbag
    input_tags: [fmt_imu]
    path: /mnt/nvme1/datasets/gici_open_dataset/5.2/gici_all.bag
    topic_name: /gici/imu_raw
    format: imu
- rosbag: 
    tag: rosbag_camera
    type: rosbag
    input_tags: [fmt_camera]
    path: /mnt/nvme1/datasets/gici_open_dataset/5.2/gici_all.bag
    topic_name: /gici/image_raw
    format: image
